# Docker Compose for local development
# For production deployment on VPS, use deploy/docker-compose.front.yml
version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_GOOGLE_AUTH_URL: ${NEXT_PUBLIC_GOOGLE_AUTH_URL:-http://localhost:3000/auth/google}
    container_name: archery_frontend_dev
    ports:
      - "8080:3001"
    restart: unless-stopped
