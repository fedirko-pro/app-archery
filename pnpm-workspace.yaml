packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  unrs-resolver: true

overrides:
  '@isaacs/brace-expansion': '>=5.0.1'
  '@angular-devkit/core>ajv': '>=8.18.0'
  '@rushstack/node-core-library>ajv': '>=8.18.0'
  esbuild: '>=0.25.0'
  glob: '>=10.5.0'
  lodash: '>=4.17.23'
  magic-string: ^0.30.10
  multer: '>=2.2.0'
  picomatch: '>=4.0.4'
  postcss: '>=8.5.10'
  tmp: '>=0.2.4'
  vite: '>=6.4.3'
  webpack: '>=5.104.1'
